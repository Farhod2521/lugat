# Serverda (185.74.5.15) ishlatish uchun — faqat DB + backend.
# Frontend Vercel'da joylashadi, shuning uchun bu yerda yo'q.
#
# Ishga tushirish (server, loyiha papkasida):
#   cp .env.prod.example .env.prod   # va qiymatlarni to'ldiring
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  # ---------- PostgreSQL ma'lumotlar bazasi ----------
  db:
    image: postgres:16-alpine
    container_name: lingvo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Port tashqariga OCHILMAYDI — faqat backend konteyneri ulanadi (xavfsiz).
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Flask backend (REST API) ----------
  backend:
    build: ./flask_backend
    container_name: lingvo_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Vercel frontend manzili(lar)i — vergul bilan ajratiladi.
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
